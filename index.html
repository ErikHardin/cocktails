<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Hardin Bar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --bg: #1a1512;
    --bg-card: #241d18;
    --bg-card-2: #2c231d;
    --line: #3a2e26;
    --cream: #ece4d8;
    --muted: #9c8f80;
    --amber: #c98a3c;
    --amber-bright: #e3a456;
    --herb: #8a9a5b;
    --danger: #b5563f;
    --shadow: 0 8px 24px rgba(0,0,0,0.35);
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse 800px 500px at 10% -10%, rgba(201,138,60,0.10), transparent),
      var(--bg);
    color:var(--cream);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  header{
    padding:48px 24px 28px;
    text-align:center;
    border-bottom:1px solid var(--line);
  }
  header h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-optical-sizing:auto;
    font-size:clamp(2.2rem,6vw,3.2rem);
    margin:0;
    letter-spacing:-0.01em;
  }
  header h1 .amp{ color:var(--amber); font-style:italic; }
  header p{
    color:var(--muted);
    margin:10px 0 0;
    font-size:0.95rem;
    letter-spacing:0.02em;
  }

  nav{
    display:flex;
    justify-content:center;
    gap:8px;
    margin:28px auto 0;
    max-width:480px;
  }
  nav button{
    flex:1;
    background:none;
    border:1px solid var(--line);
    color:var(--muted);
    padding:11px 16px;
    border-radius:999px;
    font-family:'Inter',sans-serif;
    font-size:0.85rem;
    font-weight:500;
    letter-spacing:0.03em;
    cursor:pointer;
    transition:all .15s ease;
  }
  nav button.active{
    background:var(--amber);
    border-color:var(--amber);
    color:#1a1512;
  }
  nav button:hover:not(.active){ border-color:var(--amber); color:var(--amber-bright); }

  main{
    max-width:900px;
    margin:0 auto;
    padding:32px 20px 80px;
  }
  section{ display:none; }
  section.active{ display:block; }

  h2.section-title{
    font-family:'Fraunces',serif;
    font-size:1.5rem;
    font-weight:500;
    margin:0 0 4px;
  }
  p.section-sub{ color:var(--muted); font-size:0.88rem; margin:0 0 24px; }

  /* --- My Bar tab --- */
  .add-row{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    position:relative;
  }
  .add-row input{
    flex:1;
    background:var(--bg-card);
    border:1px solid var(--line);
    color:var(--cream);
    padding:13px 16px;
    border-radius:10px;
    font-size:0.95rem;
    font-family:'Inter',sans-serif;
  }
  .add-row input:focus{ outline:none; border-color:var(--amber); }
  .add-row button{
    background:var(--amber);
    border:none;
    color:#1a1512;
    padding:0 20px;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
    font-size:0.9rem;
  }
  .add-row button:hover{ background:var(--amber-bright); }

  .suggest{
    position:absolute;
    top:54px;
    left:0;
    right:74px;
    background:var(--bg-card-2);
    border:1px solid var(--line);
    border-radius:10px;
    box-shadow:var(--shadow);
    max-height:260px;
    overflow-y:auto;
    z-index:10;
    display:none;
  }
  .suggest.show{ display:block; }
  .suggest div{
    padding:10px 16px;
    cursor:pointer;
    font-size:0.88rem;
    display:flex;
    justify-content:space-between;
  }
  .suggest div:hover{ background:rgba(201,138,60,0.12); }
  .suggest .cat{ color:var(--muted); font-size:0.78rem; }

  .bar-groups{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    gap:14px;
    align-items:start;
  }
  .bar-group{
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px 16px 14px;
  }
  .bar-group h3{
    font-family:'JetBrains Mono',monospace;
    font-size:0.7rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--amber-bright);
    margin:0 0 12px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .bar-group h3 .swatch{
    width:9px; height:9px;
    border-radius:50%;
    flex:none;
  }
  .bar-group h3 .count{
    color:var(--muted);
    font-weight:400;
    margin-left:auto;
    letter-spacing:0;
    text-transform:none;
  }
  .bottle-list{ display:flex; flex-direction:column; gap:6px; }
  .bottle{
    background:var(--bg-card-2);
    border:1px solid var(--line);
    border-radius:7px;
    padding:8px 10px;
    font-size:0.84rem;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .bottle button{
    background:none;
    border:none;
    color:var(--muted);
    cursor:pointer;
    font-size:0.95rem;
    line-height:1;
    padding:0;
    flex:none;
  }
  .bottle button:hover{ color:var(--danger); }

  .collapsible-box{
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    margin-bottom:14px;
  }
  .collapsible-toggle{
    width:100%;
    background:var(--bg-card);
    border:none;
    color:var(--cream);
    padding:14px 18px;
    font-family:'Fraunces',serif;
    font-size:1.05rem;
    font-weight:500;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    text-align:left;
  }
  .collapsible-toggle:hover{ background:var(--bg-card-2); }
  .collapsible-toggle .chevron{ color:var(--muted); }
  .collapsible-content{
    display:none;
    padding:16px 18px 18px;
    background:var(--bg-card);
    border-top:1px solid var(--line);
  }
  .collapsible-content.open{ display:block; }
  .pantry-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:8px;
  }
  .pantry-item{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:0.85rem;
    cursor:pointer;
    color:var(--cream);
    padding:6px 8px;
    border-radius:6px;
  }
  .pantry-item:hover{ background:rgba(255,255,255,0.03); }
  .pantry-item input{ accent-color:var(--amber); width:15px; height:15px; }

  /* --- Cocktails tab --- */
  .filter-row{
    display:flex;
    gap:8px;
    margin-bottom:22px;
    flex-wrap:wrap;
  }
  .filter-row button{
    background:var(--bg-card);
    border:1px solid var(--line);
    color:var(--muted);
    padding:8px 15px;
    border-radius:999px;
    font-size:0.8rem;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .filter-row button.active{ background:var(--amber); border-color:var(--amber); color:#1a1512; font-weight:600;}


  /* --- Cocktail grid: mobile-first 2-column compact --- */
  .cocktail-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:8px;
  }
  .ticket{
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:4px;
    padding:12px 10px 10px;
    position:relative;
    box-shadow:var(--shadow);
    background-image:
      linear-gradient(var(--bg-card), var(--bg-card)),
      repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(255,255,255,0.015) 8px, rgba(255,255,255,0.015) 16px);
  }
  .ticket::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height:3px;
    background:repeating-linear-gradient(90deg, var(--line) 0 6px, transparent 6px 12px);
  }
  .ticket-head{
    display:flex;
    flex-direction:column;
    gap:4px;
    margin-bottom:6px;
  }
  .ticket-head h3{
    font-family:'Fraunces',serif;
    font-size:0.85rem;
    line-height:1.25;
    margin:0;
    font-weight:600;
  }
  .stamp{
    font-family:'JetBrains Mono',monospace;
    font-size:0.52rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:2px 5px;
    border-radius:4px;
    border:1.5px solid currentColor;
    transform:rotate(3deg);
    white-space:nowrap;
    font-weight:600;
    align-self:flex-start;
  }
  .stamp.ready{ color:var(--herb); }
  .stamp.almost{ color:var(--amber-bright); }
  .stamp.missing{ color:var(--danger); }

  .ing-list{ list-style:none; margin:0 0 8px; padding:0; }
  .ing-list li{
    font-size:0.75rem;
    padding:3px 0;
    display:flex;
    align-items:baseline;
    gap:8px;
    color:var(--muted);
  }
  .ing-list li.have{ color:var(--cream); }
  .ing-list li .dot{
    width:6px; height:6px; border-radius:50%;
    background:var(--line);
    flex:none;
    margin-top:5px;
  }
  .ing-list li.have .dot{ background:var(--herb); }
  .ing-list li.need .dot{ background:var(--danger); }

  .ticket-foot{
    border-top:1px solid var(--line);
    padding-top:6px;
    font-size:0.65rem;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    display:flex;
    align-items:center;
    gap:4px;
  }
  .glass-icon{
    flex:none;
    font-size:1rem;
    line-height:1;
    filter:saturate(1.1);
  }

  /* --- Desktop: restore full card layout --- */
  @media(min-width:600px){
    .cocktail-grid{ grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:18px; }
    .ticket{ padding:20px 20px 18px; }
    .ticket-head{ flex-direction:row; justify-content:space-between; align-items:flex-start; gap:0; margin-bottom:12px; }
    .ticket-head h3{ font-size:1.2rem; }
    .stamp{ font-size:0.65rem; padding:4px 9px; align-self:auto; }
    .ing-list{ margin-bottom:12px; }
    .ing-list li{ font-size:0.85rem; padding:4px 0; }
    .ticket-foot{ padding-top:10px; font-size:0.78rem; gap:8px; }
    .glass-icon{ font-size:1.3rem; }
  }
  .modal-glass{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:4px;
  }
  .modal-glass .glass-icon{ font-size:2rem; }

  .ai-more-row{
    text-align:center;
    margin-top:28px;
  }
  .ai-btn{
    background:linear-gradient(135deg, var(--amber), var(--amber-bright));
    border:none;
    color:#1a1512;
    padding:12px 20px;
    border-radius:10px;
    font-weight:600;
    font-size:0.88rem;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .ai-btn:hover{ filter:brightness(1.08); }
  .ai-btn:disabled{ opacity:0.6; cursor:default; filter:none; }
  .ai-status{
    color:var(--muted);
    font-size:0.8rem;
    margin:0 0 20px;
    text-align:center;
  }
  .ai-status.error{ color:var(--danger); }
  .ai-badge{
    font-family:'JetBrains Mono',monospace;
    font-size:0.52rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--amber-bright);
    border:1px solid var(--amber);
    border-radius:4px;
    padding:1px 4px;
    margin-right:4px;
    white-space:nowrap;
  }
  @media(min-width:600px){
    .ai-badge{ font-size:0.62rem; padding:2px 6px; margin-right:6px; }
  }

  .spirit-filter-box{
    border:1px solid var(--line);
    border-radius:12px;
    overflow:hidden;
    margin-bottom:16px;
  }
  .spirit-filter-toggle{
    width:100%;
    background:var(--bg-card);
    border:none;
    color:var(--cream);
    padding:12px 16px;
    font-family:'Inter',sans-serif;
    font-size:0.85rem;
    font-weight:500;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    text-align:left;
  }
  .spirit-filter-toggle:hover{ background:var(--bg-card-2); }
  .spirit-active-indicator{
    margin-left:8px;
    color:var(--amber-bright);
    font-size:0.78rem;
    font-weight:400;
  }
  .spirit-filter-panel{
    display:none;
    padding:12px 14px 14px;
    background:var(--bg-card);
    border-top:1px solid var(--line);
  }
  .spirit-filter-panel.open{ display:block; }
  .spirit-grid{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:12px;
  }
  .spirit-grid button{
    background:var(--bg-card-2);
    border:1px solid var(--line);
    color:var(--muted);
    padding:6px 13px;
    border-radius:999px;
    font-size:0.75rem;
    cursor:pointer;
    font-family:'Inter',sans-serif;
    white-space:nowrap;
  }
  .spirit-grid button.selected{ background:var(--amber); border-color:var(--amber); color:#1a1512; font-weight:600; }
  .apply-filter-btn{
    background:var(--amber);
    border:none;
    color:#1a1512;
    padding:8px 20px;
    border-radius:8px;
    font-weight:600;
    font-size:0.84rem;
    cursor:pointer;
    font-family:'Inter',sans-serif;
    width:100%;
    margin-top:4px;
  }
  .apply-filter-btn:hover{ filter:brightness(1.08); }

  .empty-state{
    text-align:center;
    color:var(--muted);
    padding:60px 20px;
    font-size:0.9rem;
  }

  .ticket{ cursor:pointer; transition:border-color .15s ease, transform .15s ease; }
  .ticket:hover{ border-color:var(--amber); transform:translateY(-2px); }

  /* --- Add pantry item --- */
  .pantry-add{
    display:flex;
    gap:8px;
    margin-top:14px;
    padding-top:14px;
    border-top:1px solid var(--line);
  }
  .pantry-add input{
    flex:1;
    background:var(--bg);
    border:1px solid var(--line);
    color:var(--cream);
    padding:9px 12px;
    border-radius:8px;
    font-size:0.84rem;
  }
  .pantry-add input:focus{ outline:none; border-color:var(--amber); }
  .pantry-add button{
    background:none;
    border:1px solid var(--amber);
    color:var(--amber-bright);
    padding:0 16px;
    border-radius:8px;
    font-size:0.82rem;
    font-weight:600;
    cursor:pointer;
  }
  .pantry-add button:hover{ background:var(--amber); color:#1a1512; }

  /* --- Recipe modal --- */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(10,8,6,0.72);
    backdrop-filter:blur(3px);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:100;
  }
  .modal-overlay.show{ display:flex; }
  .modal-card{
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:14px;
    max-width:460px;
    width:100%;
    max-height:85vh;
    overflow-y:auto;
    padding:28px 28px 24px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    position:relative;
  }
  .modal-close{
    position:absolute;
    top:18px; right:18px;
    background:none;
    border:none;
    color:var(--muted);
    font-size:1.3rem;
    cursor:pointer;
    line-height:1;
  }
  .modal-close:hover{ color:var(--amber-bright); }
  .modal-card h2{
    font-family:'Fraunces',serif;
    font-size:1.6rem;
    margin:0 4px 4px 0;
    font-weight:600;
  }
  .modal-meta{
    color:var(--muted);
    font-size:0.82rem;
    margin:0 0 20px;
    font-family:'JetBrains Mono',monospace;
  }
  .modal-section-label{
    font-family:'JetBrains Mono',monospace;
    font-size:0.7rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--amber-bright);
    margin:0 0 10px;
  }
  .modal-ing-list{ list-style:none; margin:0 0 24px; padding:0; }
  .modal-ing-list li{
    display:flex;
    justify-content:space-between;
    font-size:0.92rem;
    padding:7px 0;
    border-bottom:1px solid var(--line);
  }
  .modal-ing-list li:last-child{ border-bottom:none; }
  .modal-ing-list .amt{ color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:0.84rem; }
  .modal-steps{ margin:0; padding:0; list-style:none; counter-reset:step; }
  .modal-steps li{
    counter-increment:step;
    display:flex;
    gap:14px;
    margin-bottom:14px;
    font-size:0.92rem;
    line-height:1.5;
  }
  .modal-steps li::before{
    content:counter(step);
    flex:none;
    width:24px; height:24px;
    border-radius:50%;
    border:1.5px solid var(--amber);
    color:var(--amber-bright);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'JetBrains Mono',monospace;
    font-size:0.78rem;
  }
  .modal-bottle-hint{
    display:block;
    font-size:0.74rem;
    color:var(--amber-bright);
    font-family:'JetBrains Mono',monospace;
    margin-top:3px;
    letter-spacing:0.01em;
    opacity:0.85;
  }
  .add-bottle-btn{
    width:100%;
    background:var(--bg-card);
    border:1px dashed var(--amber);
    color:var(--amber-bright);
    padding:12px;
    border-radius:10px;
    font-family:'Inter',sans-serif;
    font-size:0.9rem;
    font-weight:600;
    cursor:pointer;
    margin-bottom:14px;
    letter-spacing:0.02em;
  }
  .add-bottle-btn:hover{ background:rgba(201,138,60,0.08); }
  .add-form-input{
    width:100%;
    background:var(--bg);
    border:1px solid var(--line);
    color:var(--cream);
    padding:11px 14px;
    border-radius:8px;
    font-size:0.93rem;
    font-family:'Inter',sans-serif;
    box-sizing:border-box;
  }
  .add-form-input:focus{ outline:none; border-color:var(--amber); }
  .cat-suggestions{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:10px;
  }
  .cat-pill{
    background:var(--bg-card-2);
    border:1px solid var(--line);
    color:var(--muted);
    padding:5px 12px;
    border-radius:999px;
    font-size:0.76rem;
    cursor:pointer;
    font-family:'Inter',sans-serif;
    white-space:nowrap;
  }
  .cat-pill:hover{ border-color:var(--amber); color:var(--amber-bright); }
  .cat-pill.selected{ background:var(--amber); border-color:var(--amber); color:#1a1512; font-weight:600; }
  .add-bottle-actions{
    display:flex;
    gap:10px;
    margin-top:24px;
  }
  .add-cancel-btn{
    flex:1;
    background:none;
    border:1px solid var(--line);
    color:var(--muted);
    padding:11px;
    border-radius:8px;
    font-family:'Inter',sans-serif;
    font-size:0.88rem;
    cursor:pointer;
  }
  .add-cancel-btn:hover{ border-color:var(--cream); color:var(--cream); }
  .add-confirm-btn{
    flex:2;
    background:var(--amber);
    border:none;
    color:#1a1512;
    padding:11px;
    border-radius:8px;
    font-family:'Inter',sans-serif;
    font-size:0.88rem;
    font-weight:600;
    cursor:pointer;
  }
  .add-confirm-btn:hover{ filter:brightness(1.08); }
  .modal-card .suggest{ right:0; top:calc(100% + 4px); }
</style>
</head>
<body>

<header>
  <h1>The Hardin <span class="amp">Bar</span></h1>
  <p>Inventory what you've got. Find out what you can pour.</p>
</header>

<nav>
  <button class="active" data-tab="bar">My Bar</button>
  <button data-tab="cocktails">Cocktails</button>
</nav>

<main>

  <section id="bar" class="active">
    <h2 class="section-title">Inventory</h2>
    <p class="section-sub">Add bottles to your bar and check off your pantry staples.</p>

    <button class="add-bottle-btn" onclick="openAddBottleModal()">+ Add a bottle</button>

    <div class="collapsible-box">
      <button class="collapsible-toggle" onclick="toggleSection('pantrySection','pantryChevron')">
        <span>Pantry staples</span>
        <span class="chevron" id="pantryChevron">▴</span>
      </button>
      <div class="collapsible-content open" id="pantrySection">
        <div class="pantry-grid" id="pantryGrid"></div>
        <div class="pantry-add">
          <input type="text" id="pantryInput" placeholder="Add your own pantry item… e.g. Pineapple juice" autocomplete="off">
          <button onclick="addPantryItem()">Add</button>
        </div>
      </div>
    </div>

    <div class="collapsible-box">
      <button class="collapsible-toggle" onclick="toggleSection('spiritsSection','spiritsChevron')">
        <span>My Spirits</span>
        <span class="chevron" id="spiritsChevron">▾</span>
      </button>
      <div class="collapsible-content" id="spiritsSection">
        <div class="bar-groups" id="barGroups"></div>
      </div>

function evaluateCocktail(c){
  const cats = barCategories();
  const missingBar = [];
  const missingFresh = [];
  const haveList = [];
  c.ingredients.forEach(ing => {
    if(ing.type === 'bar'){
      const has = ing.alt.some(a => cats.has(a));
      if(has) haveList.push({label:ing.label, amount:ing.amount, have:true});
      else { haveList.push({label:ing.label, amount:ing.amount, have:false}); missingBar.push(ing.label); }
    } else {
      const has = pantry[ing.pantry];
      if(has) haveList.push({label:ing.label, amount:ing.amount, have:true});
      else { haveList.push({label:ing.label, amount:ing.amount, have:false}); missingFresh.push(ing.label); }
    }
  });
  let status;
  if(missingBar.length===0 && missingFresh.length===0) status = 'ready';
  else if(missingBar.length===0) status = 'almost';
  else status = 'missing';
  return {status, missingBar, missingFresh, haveList};
}

// Spirit families used to catch cross-family substitutions (e.g. Applejack ≠ Rye Whiskey).
const SPIRIT_FAMILIES = [
  { keywords: /\b(rye|bourbon|scotch|whiskey|whisky)\b/i, cats: new Set(["Bourbon","Rye Whiskey","Scotch","Irish Whiskey","American Single Malt Whiskey"]) },
  { keywords: /\bgin\b/i,                                  cats: new Set(["Gin"]) },
  { keywords: /\bvodka\b/i,                                cats: new Set(["Vodka"]) },
  { keywords: /\b(rum|rhum|cachaça)\b/i,                  cats: new Set(["White Rum","Dark Rum","Spiced Rum","Gold Rum","Coconut Rum","Coffee Rum","Aguardiente de Caña"]) },
  { keywords: /\b(tequila|mezcal)\b/i,                    cats: new Set(["Tequila","Mezcal"]) },
  { keywords: /\b(brandy|cognac|pisco|applejack|calvados)\b/i, cats: new Set(["Brandy","Cognac","Pisco","Applejack"]) },
];

// Returns the owned alts filtered to the correct spirit family (derived from the ingredient label).
// Returns [] if the label signals a specific family but none of the owned alts belong to it —
// that signals a wrong-spirit substitution and lets the caller reject the cocktail.
function validAltsForLabel(label, ownedAlts){
  for(const { keywords, cats } of SPIRIT_FAMILIES){
    if(keywords.test(label)){
      const filtered = ownedAlts.filter(a => cats.has(a));
      return filtered; // may be [] — caller handles that as a rejection signal
    }
  }
  return ownedAlts; // label doesn't hint at a specific family; keep all owned alts
}

async function fetchAICocktails(count = 10){
  const moreBtn = document.getElementById('aiMoreBtn');
  const status = document.getElementById('aiStatus');

  status.classList.remove('error');
  moreBtn.disabled = true;
  moreBtn.textContent = '✨ Fetching…';
  status.textContent = '';

  try {
    const ownedCategories = [...new Set(bar.map(categoryOf))].sort();
    const pantryHave = PANTRY_ITEMS.filter(p => pantry[p]);
    const maxTokens = 4000;

    // Case-insensitive owned-category check (Claude sometimes varies capitalization).
    const ownsCategory = a => ownedCategories.some(o => o.toLowerCase() === a.toLowerCase());

    // Clean and purge previously saved AI cocktails.
    // First, strip wrong-family categories from each ingredient's alt array.
    // Then drop any cocktail where a bar ingredient has no remaining valid alt.
    const cleanedCocktails = AI_COCKTAILS
      .map(c => ({
        ...c,
        ingredients: c.ingredients.map(i => {
          if(i.type !== 'bar' || !Array.isArray(i.alt)) return i;
          const ownedAlts = i.alt.filter(ownsCategory);
          if(!ownedAlts.length) return i; // nothing owned — caught by filter below
          const familyAlts = validAltsForLabel(i.label, ownedAlts);
          return familyAlts.length ? { ...i, alt: familyAlts } : i; // strip wrong-family alts; if all wrong, filter below drops cocktail
        })
      }))
      .filter(c =>
        c.ingredients
          .filter(i => i.type === 'bar')
          .every(i => {
            if(!Array.isArray(i.alt) || !i.alt.some(ownsCategory)) return false;
            const ownedAlts = i.alt.filter(ownsCategory);
            return validAltsForLabel(i.label, ownedAlts).length > 0;
          })
      );
    AI_COCKTAILS.splice(0, AI_COCKTAILS.length, ...cleanedCocktails);

    // Build name lists after the purge so Claude doesn't re-avoid removed cocktails.
    const existingNames = [...COCKTAILS, ...AI_COCKTAILS].map(c => c.name);

    const prompt = `You are a cocktail recipe generator. Respond with ONLY a JSON array — no markdown, no commentary.

Spirit categories owned: ${ownedCategories.join(', ')}.
Pantry items on hand: ${pantryHave.join(', ') || 'none'}.
Do not repeat these cocktail names: ${existingNames.join(', ')}.

Suggest ${count} real cocktails that can be made using ONLY the owned categories above. Prioritize specialty categories (Amaro, Pisco, Applejack, Absinthe, Crème de Violette, etc.). No invented drinks.

Each item must have exactly this shape:
{"name":"Name","glass":"Rocks|Coupe|Highball|Copper mug|Wine glass|Martini|Champagne flute|Shot","garnish":"garnish or None","ingredients":[{"label":"label","amount":"2 oz","type":"bar","alt":["CategoryName"]},{"label":"label","amount":"1/2 oz","type":"fresh","pantry":"Pantry item name"}],"instructions":["Step 1","Step 2","Step 3"]}

Rules:
- Only include a cocktail if EVERY bar ingredient it requires is present in the owned categories list. If a recipe needs Sweet Vermouth and Sweet Vermouth is not owned, omit that cocktail entirely — do NOT substitute a different spirit.
- "alt" arrays must only contain category names from the owned list that genuinely belong in that ingredient slot. Only spirits within the same base-spirit family may substitute (e.g., Bourbon ↔ Rye Whiskey are both whiskeys). NEVER cross families: Applejack is an apple brandy — it is NOT a substitute for any whiskey (Rye, Bourbon, Scotch, etc.). Rum ≠ Brandy. Gin ≠ Vodka. Tequila ≠ Mezcal ≠ anything else.
- "pantry" values must be capitalized short names like "Lime juice".
- 3 steps max per cocktail.
- Output ONLY the JSON array.`;

    const response = await fetch(AI_WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: maxTokens,
        messages: [{ role: "user", content: prompt }]
      })
    });

    if(!response.ok){
      const errText = await response.text().catch(() => '');
      throw new Error(`HTTP ${response.status}: ${errText.slice(0, 200)}`);
    }
    const data = await response.json();
    const textBlocks = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
    const cleaned = textBlocks.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(cleaned);
    if(!Array.isArray(parsed)) throw new Error('Unexpected response format');

    const existingLower = new Set([...COCKTAILS, ...AI_COCKTAILS].map(c => c.name.toLowerCase()));
    let added = 0;
    parsed.forEach(item => {
      if(!item || !item.name || !Array.isArray(item.ingredients) || !Array.isArray(item.instructions)) return;
      if(existingLower.has(item.name.toLowerCase())) return;

      const ingredients = item.ingredients.map(ing => {
        if(ing.type === 'bar'){
          const rawAlt = Array.isArray(ing.alt) && ing.alt.length ? ing.alt : [ing.label];
          const ownedAlts = rawAlt.filter(ownsCategory);
          // If nothing is owned, keep rawAlt so the allBarIngsSatisfied check fails via ownsCategory.
          // If something is owned, apply family filtering. An empty result here means the AI put a
          // wrong-family spirit as a substitute (e.g. Applejack for Rye Whiskey); returning []
          // causes allBarIngsSatisfied to reject the cocktail.
          const bestAlt = ownedAlts.length === 0 ? rawAlt : validAltsForLabel(ing.label || '', ownedAlts);
          return { label: ing.label || 'Spirit', amount: ing.amount || '', type:'bar', alt: bestAlt };
        }
        const pantryName = ing.pantry || ing.label || 'Misc';
        // If Claude introduces a new pantry item we don't have a checkbox for yet, add it so it's toggleable.
        if(!PANTRY_ITEMS.some(p => p.toLowerCase() === pantryName.toLowerCase())){
          PANTRY_ITEMS.push(pantryName);
          if(pantry[pantryName] === undefined) pantry[pantryName] = false;
        }
        return { label: ing.label || pantryName, amount: ing.amount || '', type:'fresh', pantry: pantryName };
      });

      // Skip cocktails where any bar ingredient has no owned category — Claude substituted wrong spirits.
      const allBarIngsSatisfied = ingredients
        .filter(i => i.type === 'bar')
        .every(i => i.alt.some(ownsCategory));
      if(!allBarIngsSatisfied) return;

      AI_COCKTAILS.push({
        name: item.name,
        glass: item.glass || 'Rocks',
        garnish: item.garnish || 'None',
        ingredients,
        instructions: item.instructions,
        isAI: true
      });
      existingLower.add(item.name.toLowerCase());
      added++;
    });

    status.textContent = added > 0
      ? `Added ${added} new cocktail idea${added===1?'':'s'} — look for the ✨ AI tag below.`
      : `Claude didn't return any new ideas this time — try fetching more.`;
    if(window.saveAICocktailsToFirebase) window.saveAICocktailsToFirebase(AI_COCKTAILS);
    renderPantry();
    renderSpiritFilter();
    renderCocktails();
  } catch(err){
    console.error(err);
    status.textContent = `Error: ${err.message}`;
    status.classList.add('error');
  } finally {
    moreBtn.disabled = false;
    moreBtn.textContent = '✨ Fetch cocktails';
  }
}

/* ---------------- INIT ---------------- */
renderBar();
renderPantry();
renderSpiritFilter();
renderCocktails();
</script>

<script type="module">
  // Firebase Realtime Database sync for the liquor inventory ("bar") and pantry staples.
  // AI-suggested cocktails stay local/session-only by design.
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-database.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

  // Fill in with your Firebase project config (Firebase console → Project settings → General → Your apps).
  // Requires a Realtime Database and Anonymous sign-in enabled (Authentication → Sign-in method → Anonymous).
  const firebaseConfig = {
    apiKey: "AIzaSyBWwzVzKZZfTnICxdkMI51Yc6E__oL6w_E",
    authDomain: "cocktails-3e473.firebaseapp.com",
    databaseURL: "https://cocktails-3e473-default-rtdb.firebaseio.com",
    projectId: "cocktails-3e473",
    storageBucket: "cocktails-3e473.firebasestorage.app",
    messagingSenderId: "778892882921",
    appId: "1:778892882921:web:572a2d57113a4d1bd7d178"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);
  const barRef = ref(db, 'bar');
  const pantryRef = ref(db, 'pantry');
  const aiRef = ref(db, 'aiCocktails');
  const liquorDbRef = ref(db, 'liquorDb');
  const spiritTypesRef = ref(db, 'spiritTypes');

  function setSyncStatus(msg, isError){
    let el = document.getElementById('syncStatus');
    if(!el){
      el = document.createElement('p');
      el.id = 'syncStatus';
      el.style.cssText = 'position:fixed;bottom:16px;right:16px;font-size:0.75rem;padding:6px 12px;border-radius:6px;z-index:200;margin:0;font-family:JetBrains Mono,monospace;';
      document.body.appendChild(el);
    }
    el.textContent = msg;
    el.style.background = isError ? 'var(--danger)' : 'var(--bg-card)';
    el.style.border = `1px solid ${isError ? 'var(--danger)' : 'var(--line)'}`;
    el.style.color = isError ? '#fff' : 'var(--muted)';
    if(!isError) setTimeout(() => el.remove(), 3000);
  }

  signInAnonymously(auth).then(() => {
    onValue(barRef, (snapshot) => {
      const data = snapshot.val();
      if(data === null){
        // Nothing in the database yet — seed it once with the app's built-in default inventory.
        if(window.getDefaultBar) set(barRef, window.getDefaultBar());
        return;
      }
      // data is stored as an object ({0: "...", 1: "..."}) or array depending on how it was written — normalize to an array.
      const barArray = Array.isArray(data) ? data.filter(Boolean) : Object.values(data);
      if(window.applyBarUpdate) window.applyBarUpdate(barArray);
      setSyncStatus('✓ Bar synced', false);
    }, (err) => {
      console.error('Firebase read failed:', err);
      setSyncStatus('⚠ Sync failed: ' + err.message, true);
    });

    onValue(pantryRef, (snapshot) => {
      const data = snapshot.val();
      if(data === null){
        if(window.getDefaultPantry) set(pantryRef, window.getDefaultPantry());
        return;
      }
      if(window.applyPantryUpdate) window.applyPantryUpdate(data);
      setSyncStatus('✓ Pantry synced', false);
    }, (err) => {
      console.error('Firebase pantry read failed:', err);
    });

    onValue(liquorDbRef, (snapshot) => {
      const data = snapshot.val();
      if(data === null){
        if(window.getDefaultLiquorDb) set(liquorDbRef, window.getDefaultLiquorDb());
        return;
      }
      const arr = Array.isArray(data) ? data.filter(Boolean) : Object.values(data).filter(Boolean);
      if(window.applyLiquorDbUpdate) window.applyLiquorDbUpdate(arr);
    }, (err) => {
      console.error('Firebase liquorDb read failed:', err);
    });

    onValue(spiritTypesRef, (snapshot) => {
      const data = snapshot.val();
      if(data === null){
        if(window.getDefaultSpiritTypes) set(spiritTypesRef, window.getDefaultSpiritTypes());
        return;
      }
      if(window.applySpiritTypesUpdate) window.applySpiritTypesUpdate(data);
    }, (err) => {
      console.error('Firebase spiritTypes read failed:', err);
    });
  }).catch(err => {
    console.error('Firebase auth failed — falling back to local-only inventory:', err);
    setSyncStatus('⚠ Firebase auth failed: ' + err.message, true);
  });

  // Exposed for the main app script to call whenever a bottle is added or removed.
  window.saveBarToFirebase = function(barArray){
    set(barRef, barArray).catch(err => console.error('Firebase save failed:', err));
  };

  window.savePantryToFirebase = function(pantryObj){
    set(pantryRef, pantryObj).catch(err => console.error('Firebase pantry save failed:', err));
  };

  // Load saved AI cocktails on startup, then keep in sync.
  onValue(aiRef, (snapshot) => {
    const data = snapshot.val();
    if(!data) return;
    const arr = Array.isArray(data) ? data : Object.values(data);
    if(window.applyAICocktailsUpdate) window.applyAICocktailsUpdate(arr);
  });

  window.saveAICocktailsToFirebase = function(cocktails){
    set(aiRef, cocktails).catch(err => console.error('Firebase AI save failed:', err));
  };

  window.saveLiquorDbToFirebase = function(db){
    set(liquorDbRef, db).catch(err => console.error('Firebase liquorDb save failed:', err));
  };
</script>

</body>
