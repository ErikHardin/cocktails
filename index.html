<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Hardin Bar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --bg: #1a1512;
    --bg-card: #241d18;
    --bg-card-2: #2c231d;
    --line: #3a2e26;
    --cream: #ece4d8;
    --muted: #9c8f80;
    --amber: #c98a3c;
    --amber-bright: #e3a456;
    --herb: #8a9a5b;
    --danger: #b5563f;
    --shadow: 0 8px 24px rgba(0,0,0,0.35);
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse 800px 500px at 10% -10%, rgba(201,138,60,0.10), transparent),
      var(--bg);
    color:var(--cream);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  header{
    padding:48px 24px 28px;
    text-align:center;
    border-bottom:1px solid var(--line);
  }
  header h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-optical-sizing:auto;
    font-size:clamp(2.2rem,6vw,3.2rem);
    margin:0;
    letter-spacing:-0.01em;
  }
  header h1 .amp{ color:var(--amber); font-style:italic; }
  header p{
    color:var(--muted);
    margin:10px 0 0;
    font-size:0.95rem;
    letter-spacing:0.02em;
  }

  nav{
    display:flex;
    justify-content:center;
    gap:8px;
    margin:28px auto 0;
    max-width:480px;
  }
  nav button{
    flex:1;
    background:none;
    border:1px solid var(--line);
    color:var(--muted);
    padding:11px 16px;
    border-radius:999px;
    font-family:'Inter',sans-serif;
    font-size:0.85rem;
    font-weight:500;
    letter-spacing:0.03em;
    cursor:pointer;
    transition:all .15s ease;
  }
  nav button.active{
    background:var(--amber);
    border-color:var(--amber);
    color:#1a1512;
  }
  nav button:hover:not(.active){ border-color:var(--amber); color:var(--amber-bright); }

  main{
    max-width:900px;
    margin:0 auto;
    padding:32px 20px 80px;
  }
  section{ display:none; }
  section.active{ display:block; }

  h2.section-title{
    font-family:'Fraunces',serif;
    font-size:1.5rem;
    font-weight:500;
    margin:0 0 4px;
  }
  p.section-sub{ color:var(--muted); font-size:0.88rem; margin:0 0 24px; }

  /* --- My Bar tab --- */
  .add-row{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    position:relative;
  }
  .add-row input{
    flex:1;
    background:var(--bg-card);
    border:1px solid var(--line);
    color:var(--cream);
    padding:13px 16px;
    border-radius:10px;
    font-size:0.95rem;
    font-family:'Inter',sans-serif;
  }
  .add-row input:focus{ outline:none; border-color:var(--amber); }
  .add-row button{
    background:var(--amber);
    border:none;
    color:#1a1512;
    padding:0 20px;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
    font-size:0.9rem;
  }
  .add-row button:hover{ background:var(--amber-bright); }

  .suggest{
    position:absolute;
    top:54px;
    left:0;
    right:74px;
    background:var(--bg-card-2);
    border:1px solid var(--line);
    border-radius:10px;
    box-shadow:var(--shadow);
    max-height:260px;
    overflow-y:auto;
    z-index:10;
    display:none;
  }
  .suggest.show{ display:block; }
  .suggest div{
    padding:10px 16px;
    cursor:pointer;
    font-size:0.88rem;
    display:flex;
    justify-content:space-between;
  }
  .suggest div:hover{ background:rgba(201,138,60,0.12); }
  .suggest .cat{ color:var(--muted); font-size:0.78rem; }

  .bar-groups{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    gap:14px;
    align-items:start;
  }
  .bar-group{
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px 16px 14px;
  }
  .bar-group h3{
    font-family:'JetBrains Mono',monospace;
    font-size:0.7rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--amber-bright);
    margin:0 0 12px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .bar-group h3 .swatch{
    width:9px; height:9px;
    border-radius:50%;
    flex:none;
  }
  .bar-group h3 .count{
    color:var(--muted);
    font-weight:400;
    margin-left:auto;
    letter-spacing:0;
    text-transform:none;
  }
  .bottle-list{ display:flex; flex-direction:column; gap:6px; }
  .bottle{
    background:var(--bg-card-2);
    border:1px solid var(--line);
    border-radius:7px;
    padding:8px 10px;
    font-size:0.84rem;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .bottle button{
    background:none;
    border:none;
    color:var(--muted);
    cursor:pointer;
    font-size:0.95rem;
    line-height:1;
    padding:0;
    flex:none;
  }
  .bottle button:hover{ color:var(--danger); }

  .pantry-box{
    margin-top:32px;
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px 22px;
  }
  .pantry-box h3{
    font-family:'Fraunces',serif;
    font-size:1.05rem;
    margin:0 0 4px;
    font-weight:500;
  }
  .pantry-box p{ color:var(--muted); font-size:0.82rem; margin:0 0 16px; }
  .pantry-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:8px;
  }
  .pantry-item{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:0.85rem;
    cursor:pointer;
    color:var(--cream);
    padding:6px 8px;
    border-radius:6px;
  }
  .pantry-item:hover{ background:rgba(255,255,255,0.03); }
  .pantry-item input{ accent-color:var(--amber); width:15px; height:15px; }

  /* --- Cocktails tab --- */
  .filter-row{
    display:flex;
    gap:8px;
    margin-bottom:22px;
    flex-wrap:wrap;
  }
  .filter-row button{
    background:var(--bg-card);
    border:1px solid var(--line);
    color:var(--muted);
    padding:8px 15px;
    border-radius:999px;
    font-size:0.8rem;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .filter-row button.active{ background:var(--amber); border-color:var(--amber); color:#1a1512; font-weight:600;}

  .shop-list{
    background:var(--bg-card);
    border:1px dashed var(--amber);
    border-radius:12px;
    padding:16px 20px;
    margin-bottom:26px;
    font-size:0.86rem;
  }
  .shop-list strong{ color:var(--amber-bright); display:block; margin-bottom:6px; font-family:'Fraunces',serif; font-size:1rem;}
  .shop-list span.tag{
    display:inline-block;
    background:var(--bg-card-2);
    border:1px solid var(--line);
    border-radius:6px;
    padding:3px 9px;
    margin:3px 4px 0 0;
    font-size:0.78rem;
    color:var(--cream);
  }

  .cocktail-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:18px;
  }
  .ticket{
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:4px;
    padding:20px 20px 18px;
    position:relative;
    box-shadow:var(--shadow);
    background-image:
      linear-gradient(var(--bg-card), var(--bg-card)),
      repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(255,255,255,0.015) 8px, rgba(255,255,255,0.015) 16px);
  }
  .ticket::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height:3px;
    background:repeating-linear-gradient(90deg, var(--line) 0 6px, transparent 6px 12px);
  }
  .ticket-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:12px;
  }
  .ticket-head h3{
    font-family:'Fraunces',serif;
    font-size:1.2rem;
    margin:0;
    font-weight:600;
  }
  .stamp{
    font-family:'JetBrains Mono',monospace;
    font-size:0.65rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:4px 9px;
    border-radius:4px;
    border:1.5px solid currentColor;
    transform:rotate(3deg);
    white-space:nowrap;
    font-weight:600;
  }
  .stamp.ready{ color:var(--herb); }
  .stamp.almost{ color:var(--amber-bright); }
  .stamp.missing{ color:var(--danger); }

  .ing-list{ list-style:none; margin:0 0 12px; padding:0; }
  .ing-list li{
    font-size:0.85rem;
    padding:4px 0;
    display:flex;
    align-items:baseline;
    gap:8px;
    color:var(--muted);
  }
  .ing-list li.have{ color:var(--cream); }
  .ing-list li .dot{
    width:6px; height:6px; border-radius:50%;
    background:var(--line);
    flex:none;
    margin-top:5px;
  }
  .ing-list li.have .dot{ background:var(--herb); }
  .ing-list li.need .dot{ background:var(--danger); }

  .ticket-foot{
    border-top:1px solid var(--line);
    padding-top:10px;
    font-size:0.78rem;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .glass-icon{
    flex:none;
    font-size:1.3rem;
    line-height:1;
    filter:saturate(1.1);
  }
  .modal-glass{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:4px;
  }
  .modal-glass .glass-icon{ font-size:2rem; }

  .ai-more-row{
    text-align:center;
    margin-top:28px;
  }
  .ai-btn{
    background:linear-gradient(135deg, var(--amber), var(--amber-bright));
    border:none;
    color:#1a1512;
    padding:12px 20px;
    border-radius:10px;
    font-weight:600;
    font-size:0.88rem;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .ai-btn:hover{ filter:brightness(1.08); }
  .ai-btn:disabled{ opacity:0.6; cursor:default; filter:none; }
  .ai-status{
    color:var(--muted);
    font-size:0.8rem;
    margin:0 0 20px;
    text-align:center;
  }
  .ai-status.error{ color:var(--danger); }
  .ai-badge{
    font-family:'JetBrains Mono',monospace;
    font-size:0.62rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--amber-bright);
    border:1px solid var(--amber);
    border-radius:4px;
    padding:2px 6px;
    margin-right:6px;
    white-space:nowrap;
  }

  .empty-state{
    text-align:center;
    color:var(--muted);
    padding:60px 20px;
    font-size:0.9rem;
  }

  .ticket{ cursor:pointer; transition:border-color .15s ease, transform .15s ease; }
  .ticket:hover{ border-color:var(--amber); transform:translateY(-2px); }

  /* --- Add pantry item --- */
  .pantry-add{
    display:flex;
    gap:8px;
    margin-top:14px;
    padding-top:14px;
    border-top:1px solid var(--line);
  }
  .pantry-add input{
    flex:1;
    background:var(--bg);
    border:1px solid var(--line);
    color:var(--cream);
    padding:9px 12px;
    border-radius:8px;
    font-size:0.84rem;
  }
  .pantry-add input:focus{ outline:none; border-color:var(--amber); }
  .pantry-add button{
    background:none;
    border:1px solid var(--amber);
    color:var(--amber-bright);
    padding:0 16px;
    border-radius:8px;
    font-size:0.82rem;
    font-weight:600;
    cursor:pointer;
  }
  .pantry-add button:hover{ background:var(--amber); color:#1a1512; }

  /* --- Recipe modal --- */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(10,8,6,0.72);
    backdrop-filter:blur(3px);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:100;
  }
  .modal-overlay.show{ display:flex; }
  .modal-card{
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:14px;
    max-width:460px;
    width:100%;
    max-height:85vh;
    overflow-y:auto;
    padding:28px 28px 24px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    position:relative;
  }
  .modal-close{
    position:absolute;
    top:18px; right:18px;
    background:none;
    border:none;
    color:var(--muted);
    font-size:1.3rem;
    cursor:pointer;
    line-height:1;
  }
  .modal-close:hover{ color:var(--amber-bright); }
  .modal-card h2{
    font-family:'Fraunces',serif;
    font-size:1.6rem;
    margin:0 4px 4px 0;
    font-weight:600;
  }
  .modal-meta{
    color:var(--muted);
    font-size:0.82rem;
    margin:0 0 20px;
    font-family:'JetBrains Mono',monospace;
  }
  .modal-section-label{
    font-family:'JetBrains Mono',monospace;
    font-size:0.7rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--amber-bright);
    margin:0 0 10px;
  }
  .modal-ing-list{ list-style:none; margin:0 0 24px; padding:0; }
  .modal-ing-list li{
    display:flex;
    justify-content:space-between;
    font-size:0.92rem;
    padding:7px 0;
    border-bottom:1px solid var(--line);
  }
  .modal-ing-list li:last-child{ border-bottom:none; }
  .modal-ing-list .amt{ color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:0.84rem; }
  .modal-steps{ margin:0; padding:0; list-style:none; counter-reset:step; }
  .modal-steps li{
    counter-increment:step;
    display:flex;
    gap:14px;
    margin-bottom:14px;
    font-size:0.92rem;
    line-height:1.5;
  }
  .modal-steps li::before{
    content:counter(step);
    flex:none;
    width:24px; height:24px;
    border-radius:50%;
    border:1.5px solid var(--amber);
    color:var(--amber-bright);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'JetBrains Mono',monospace;
    font-size:0.78rem;
  }
</style>
</head>
<body>

<header>
  <h1>The Hardin <span class="amp">Bar</span></h1>
  <p>Inventory what you've got. Find out what you can pour.</p>
</header>

<nav>
  <button class="active" data-tab="bar">My Bar</button>
  <button data-tab="cocktails">Cocktails</button>
</nav>

<main>

  <section id="bar" class="active">
    <h2 class="section-title">Inventory</h2>
    <p class="section-sub">Search a bottle to add it, or type your own and hit Add.</p>

    <div class="add-row">
      <input type="text" id="bottleInput" placeholder="Search a bottle… e.g. Hendrick's, Bourbon, Campari" autocomplete="off">
      <button onclick="addCustomBottle()">Add</button>
      <div class="suggest" id="suggestBox"></div>
    </div>

    <div class="bar-groups" id="barGroups"></div>

    <div class="pantry-box">
      <h3>Pantry staples</h3>
      <p>Cheap stuff you grab on the way home — check off what's already in your kitchen.</p>
      <div class="pantry-grid" id="pantryGrid"></div>
      <div class="pantry-add">
        <input type="text" id="pantryInput" placeholder="Add your own pantry item… e.g. Pineapple juice" autocomplete="off">
        <button onclick="addPantryItem()">Add</button>
      </div>
    </div>
  </section>

  <section id="cocktails">
    <h2 class="section-title">What can I make?</h2>
    <p class="section-sub">Matched against your bar and pantry, live.</p>

    <div class="ai-more-row">
      <button id="aiMoreBtn" class="ai-btn" onclick="fetchAICocktails(10)" style="display:none;">✨ Fetch more cocktails</button>
    </div>

    <p id="aiStatus" class="ai-status"></p>

    <div class="filter-row" id="filterRow"></div>
    <div id="shopListBox"></div>
    <div class="cocktail-grid" id="cocktailGrid"></div>
  </section>

</main>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">
  <div class="modal-card">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="modalContent"></div>
  </div>
</div>

// Hooks the Firebase module script (bottom of page) calls into.
window.getDefaultBar = function(){ return DEFAULT_BAR; };
window.applyBarUpdate = function(newBar){
  bar = newBar;
  renderBar();
  renderCocktails();
};
window.applyAICocktailsUpdate = function(saved){
  if(!Array.isArray(saved)) return;
  saved.filter(Boolean).forEach(c => {
    if(!c || !c.name || !Array.isArray(c.ingredients)) return;
    c.ingredients.forEach(ing => {
      if(ing.type === 'fresh'){
        const p = ing.pantry || ing.label;
        if(p && !PANTRY_ITEMS.some(x => x.toLowerCase() === p.toLowerCase())){
          PANTRY_ITEMS.push(p);
          if(pantry[p] === undefined) pantry[p] = false;
        }
      }
    });
    if(!AI_COCKTAILS.some(x => x.name.toLowerCase() === c.name.toLowerCase()))
      AI_COCKTAILS.push({...c, isAI: true});
  });
  renderPantry();
  renderCocktails();
};

function categoryOf(bottleName){
  const hit = LIQUOR_DB.find(l => l.name.toLowerCase() === bottleName.toLowerCase());
  return hit ? hit.category : bottleName; // custom entries: treat name as its own category
}
function barCategories(){
  return new Set(bar.map(categoryOf));
}

const bottleInput = document.getElementById('bottleInput');
const suggestBox = document.getElementById('suggestBox');

bottleInput.addEventListener('input', ()=>{
  const q = bottleInput.value.trim().toLowerCase();
  if(!q){ suggestBox.classList.remove('show'); return; }
  const matches = LIQUOR_DB.filter(l =>
    l.name.toLowerCase().includes(q) || l.category.toLowerCase().includes(q)
  ).slice(0,8);
  if(matches.length===0){ suggestBox.classList.remove('show'); return; }
  suggestBox.innerHTML = matches.map(m =>
    `<div onclick="selectSuggestion('${m.name.replace(/'/g,"\\'")}')">${m.name} <span class="cat">${m.category}</span></div>`
  ).join('');
  suggestBox.classList.add('show');
});
bottleInput.addEventListener('keydown', e=>{
  if(e.key === 'Enter'){ addCustomBottle(); }
});
document.addEventListener('click', e=>{
  if(!suggestBox.contains(e.target) && e.target !== bottleInput){ suggestBox.classList.remove('show'); }
});

function selectSuggestion(name){
  bottleInput.value = name;
  suggestBox.classList.remove('show');
  addCustomBottle();
}
function addCustomBottle(){
  const val = bottleInput.value.trim();
  if(!val) return;
  bar.push(val);
  bottleInput.value = '';
  suggestBox.classList.remove('show');
  renderBar();
  renderCocktails();
  if(window.saveBarToFirebase) window.saveBarToFirebase(bar);
}
function removeBottle(idx){
  bar.splice(idx,1);
  renderBar();
  renderCocktails();
  if(window.saveBarToFirebase) window.saveBarToFirebase(bar);
}

function evaluateCocktail(c){
  const cats = barCategories();
  const missingBar = [];
  const missingFresh = [];
  const haveList = [];
  c.ingredients.forEach(ing => {
    if(ing.type === 'bar'){
      const has = ing.alt.some(a => cats.has(a));
      if(has) haveList.push({label:ing.label, amount:ing.amount, have:true});
      else { haveList.push({label:ing.label, amount:ing.amount, have:false}); missingBar.push(ing.label); }
    } else {
      const has = pantry[ing.pantry];
      if(has) haveList.push({label:ing.label, amount:ing.amount, have:true});
      else { haveList.push({label:ing.label, amount:ing.amount, have:false}); missingFresh.push(ing.label); }
    }
  });
  let status;
  if(missingBar.length===0 && missingFresh.length===0) status = 'ready';
  else if(missingBar.length===0) status = 'almost';
  else status = 'missing';
  return {status, missingBar, missingFresh, haveList};
}

function renderCocktails(){
  const evaluated = [...AI_COCKTAILS, ...COCKTAILS].map(c => ({c, ev: evaluateCocktail(c)}));

  // shopping list aggregate (fresh items missing across cocktails that are otherwise ready/almost)
  const shopSet = new Set();
  evaluated.forEach(({ev}) => { if(ev.status !== 'missing') ev.missingFresh.forEach(f => shopSet.add(f)); });
  const shopBox = document.getElementById('shopListBox');
  if(shopSet.size > 0){
    shopBox.innerHTML = `
      <div class="shop-list">
        <strong>Grab these and unlock more cocktails</strong>
        ${[...shopSet].map(i => `<span class="tag">${i}</span>`).join('')}
      </div>`;
  } else {
    shopBox.innerHTML = '';
  }

  const filtered = evaluated.filter(({ev}) => currentFilter==='all' || ev.status===currentFilter);

  if(filtered.length===0){
    document.getElementById('cocktailGrid').innerHTML = `<div class="empty-state">Nothing matches this filter yet. Add a bottle or check off a pantry item.</div>`;
    return;
  }

  const statusMeta = {
    ready:{label:"Ready", cls:"ready"},
    almost:{label:"Grab pantry items", cls:"almost"},
    missing:{label:"Need a bottle", cls:"missing"},
  };

  document.getElementById('cocktailGrid').innerHTML = filtered.map(({c, ev}) => `
    <div class="ticket" onclick="openCocktailModal('${c.name.replace(/'/g,"\\'")}')">
      <div class="ticket-head">
        <h3>${c.name}</h3>
        <span style="display:flex; align-items:center; gap:6px; flex:none;">
          ${c.isAI ? '<span class="ai-badge">✨ AI</span>' : ''}
          <span class="stamp ${statusMeta[ev.status].cls}">${statusMeta[ev.status].label}</span>
        </span>
      </div>
      <ul class="ing-list">
        ${ev.haveList.map(i => `<li class="${i.have?'have':'need'}"><span class="dot"></span>${i.label}</li>`).join('')}
      </ul>
      <div class="ticket-foot"><span class="glass-icon">${glassIcon(c.glass)}</span>${c.glass}</div>
    </div>
  `).join('');
}

function openCocktailModal(name){
  const c = [...COCKTAILS, ...AI_COCKTAILS].find(c => c.name === name);
  if(!c) return;
  const ev = evaluateCocktail(c);
  const statusMeta = {
    ready:{label:"Ready to make", cls:"ready"},
    almost:{label:"Grab pantry items first", cls:"almost"},
    missing:{label:"Need a bottle first", cls:"missing"},
  };
  document.getElementById('modalContent').innerHTML = `
    <h2>${c.name}</h2>
    <div class="modal-glass"><span class="glass-icon">${glassIcon(c.glass)}</span><span class="modal-meta" style="margin:0;">${c.glass}${c.garnish && c.garnish !== 'None' ? ' · Garnish: ' + c.garnish : ''}</span></div>
    <p class="modal-meta">${c.isAI ? '<span class="ai-badge">✨ AI suggested</span> ' : ''}<span class="stamp ${statusMeta[ev.status].cls}">${statusMeta[ev.status].label}</span></p>
    <p class="modal-section-label">Ingredients</p>
    <ul class="modal-ing-list">
      ${ev.haveList.map(i => `<li><span style="color:${i.have ? 'var(--cream)' : 'var(--danger)'}">${i.label}${i.have ? '' : ' (need to get)'}</span><span class="amt">${i.amount}</span></li>`).join('')}
    </ul>
    <p class="modal-section-label">Method</p>
    <ol class="modal-steps">
      ${c.instructions.map(step => `<li>${step}</li>`).join('')}
    </ol>
  `;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('show');
}
document.addEventListener('keydown', e=>{ if(e.key === 'Escape') closeModal(); });

/* ---------------- AI COCKTAIL SUGGESTIONS ---------------- */
async function fetchAICocktails(count = 10, isInitial = false){
  const moreBtn = document.getElementById('aiMoreBtn');
  const status = document.getElementById('aiStatus');

  status.classList.remove('error');
  if(isInitial){
    status.textContent = `✨ Asking Claude for ${count} cocktail ideas based on your bar…`;
    moreBtn.style.display = 'none';
  } else {
    moreBtn.disabled = true;
    moreBtn.textContent = '✨ Mixing more ideas…';
    status.textContent = '';
  }

  try {
    const ownedCategories = [...new Set(bar.map(categoryOf))].sort();
    const pantryHave = PANTRY_ITEMS.filter(p => pantry[p]);
    const existingNames = [...COCKTAILS, ...AI_COCKTAILS].map(c => c.name);
    const maxTokens = 4000;

    const prompt = `You are a cocktail recipe generator. Respond with ONLY a JSON array — no markdown, no commentary.

Spirit categories owned: ${ownedCategories.join(', ')}.
Pantry items on hand: ${pantryHave.join(', ') || 'none'}.
Do not repeat these cocktail names: ${existingNames.join(', ')}.

Suggest ${count} real cocktails using the owned categories. Prioritize specialty categories (Amaro, Pisco, Applejack, Absinthe, Crème de Violette, etc.). No invented drinks.

Each item must have exactly this shape:
{"name":"Name","glass":"Rocks|Coupe|Highball|Copper mug|Wine glass|Martini|Champagne flute|Shot","garnish":"garnish or None","ingredients":[{"label":"label","amount":"2 oz","type":"bar","alt":["CategoryName"]},{"label":"label","amount":"1/2 oz","type":"fresh","pantry":"Pantry item name"}],"instructions":["Step 1","Step 2","Step 3"]}

Rules:
- "alt" arrays must use exact category names from the owned list above.
- "pantry" values must be capitalized short names like "Lime juice".
- 3 steps max per cocktail.
- Output ONLY the JSON array.`;

    const response = await fetch(AI_WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: maxTokens,
        messages: [{ role: "user", content: prompt }]
      })
    });

    if(!response.ok){
      const errText = await response.text().catch(() => '');
      throw new Error(`HTTP ${response.status}: ${errText.slice(0, 200)}`);
    }
    const data = await response.json();
    const textBlocks = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
    const cleaned = textBlocks.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(cleaned);
    if(!Array.isArray(parsed)) throw new Error('Unexpected response format');

    const existingLower = new Set([...COCKTAILS, ...AI_COCKTAILS].map(c => c.name.toLowerCase()));
    let added = 0;
    parsed.forEach(item => {
      if(!item || !item.name || !Array.isArray(item.ingredients) || !Array.isArray(item.instructions)) return;
      if(existingLower.has(item.name.toLowerCase())) return;

      const ingredients = item.ingredients.map(ing => {
        if(ing.type === 'bar'){
          return { label: ing.label || 'Spirit', amount: ing.amount || '', type:'bar', alt: Array.isArray(ing.alt) && ing.alt.length ? ing.alt : [ing.label] };
        }
        const pantryName = ing.pantry || ing.label || 'Misc';
        // If Claude introduces a new pantry item we don't have a checkbox for yet, add it so it's toggleable.
        if(!PANTRY_ITEMS.some(p => p.toLowerCase() === pantryName.toLowerCase())){
          PANTRY_ITEMS.push(pantryName);
          if(pantry[pantryName] === undefined) pantry[pantryName] = false;
        }
        return { label: ing.label || pantryName, amount: ing.amount || '', type:'fresh', pantry: pantryName };
      });

      AI_COCKTAILS.push({
        name: item.name,
        glass: item.glass || 'Rocks',
        garnish: item.garnish || 'None',
        ingredients,
        instructions: item.instructions,
        isAI: true
      });
      existingLower.add(item.name.toLowerCase());
      added++;
    });

    status.textContent = added > 0
      ? `Added ${added} new cocktail idea${added===1?'':'s'} — look for the ✨ AI tag below.`
      : `Claude didn't return any new ideas this time — try fetching more.`;
    if(window.saveAICocktailsToFirebase) window.saveAICocktailsToFirebase(AI_COCKTAILS);
    renderPantry();
    renderCocktails();
  } catch(err){
    console.error(err);
    status.textContent = `Error: ${err.message}`;
    status.classList.add('error');
  } finally {
    moreBtn.style.display = 'inline-block';
    moreBtn.disabled = false;
    moreBtn.textContent = '✨ Fetch more cocktails';
  }
}

/* ---------------- INIT ---------------- */
renderBar();
renderPantry();
renderCocktails();
</script>

<script type="module">
  // Firebase Realtime Database sync for the liquor inventory ("bar").
  // Pantry staples and AI-suggested cocktails stay local/session-only by design —
  // only the bottle inventory is synced so it's shared across devices.
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-database.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

  // Fill in with your Firebase project config (Firebase console → Project settings → General → Your apps).
  // Requires a Realtime Database and Anonymous sign-in enabled (Authentication → Sign-in method → Anonymous).
  const firebaseConfig = {
    apiKey: "AIzaSyBWwzVzKZZfTnICxdkMI51Yc6E__oL6w_E",
    authDomain: "cocktails-3e473.firebaseapp.com",
    databaseURL: "https://cocktails-3e473-default-rtdb.firebaseio.com",
    projectId: "cocktails-3e473",
    storageBucket: "cocktails-3e473.firebasestorage.app",
    messagingSenderId: "778892882921",
    appId: "1:778892882921:web:572a2d57113a4d1bd7d178"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);
  const barRef = ref(db, 'bar');
  const aiRef = ref(db, 'aiCocktails');

  function setSyncStatus(msg, isError){
    let el = document.getElementById('syncStatus');
    if(!el){
      el = document.createElement('p');
      el.id = 'syncStatus';
      el.style.cssText = 'position:fixed;bottom:16px;right:16px;font-size:0.75rem;padding:6px 12px;border-radius:6px;z-index:200;margin:0;font-family:JetBrains Mono,monospace;';
      document.body.appendChild(el);
    }
    el.textContent = msg;
    el.style.background = isError ? 'var(--danger)' : 'var(--bg-card)';
    el.style.border = `1px solid ${isError ? 'var(--danger)' : 'var(--line)'}`;
    el.style.color = isError ? '#fff' : 'var(--muted)';
    if(!isError) setTimeout(() => el.remove(), 3000);
  }

  signInAnonymously(auth).then(() => {
    onValue(barRef, (snapshot) => {
      const data = snapshot.val();
      if(data === null){
        // Nothing in the database yet — seed it once with the app's built-in default inventory.
        if(window.getDefaultBar) set(barRef, window.getDefaultBar());
        return;
      }
      // data is stored as an object ({0: "...", 1: "..."}) or array depending on how it was written — normalize to an array.
      const barArray = Array.isArray(data) ? data.filter(Boolean) : Object.values(data);
      if(window.applyBarUpdate) window.applyBarUpdate(barArray);
      setSyncStatus('✓ Bar synced', false);
    }, (err) => {
      console.error('Firebase read failed:', err);
      setSyncStatus('⚠ Sync failed: ' + err.message, true);
    });
  }).catch(err => {
    console.error('Firebase auth failed — falling back to local-only inventory:', err);
    setSyncStatus('⚠ Firebase auth failed: ' + err.message, true);
  });

  // Exposed for the main app script to call whenever a bottle is added or removed.
  window.saveBarToFirebase = function(barArray){
    set(barRef, barArray).catch(err => console.error('Firebase save failed:', err));
  };

  // Load saved AI cocktails on startup, then keep in sync.
  onValue(aiRef, (snapshot) => {
    const data = snapshot.val();
    if(!data) return;
    const arr = Array.isArray(data) ? data : Object.values(data);
    if(window.applyAICocktailsUpdate) window.applyAICocktailsUpdate(arr);
  });

  window.saveAICocktailsToFirebase = function(cocktails){
    set(aiRef, cocktails).catch(err => console.error('Firebase AI save failed:', err));
  };
</script>
